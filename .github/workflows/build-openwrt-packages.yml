name: Build OpenWrt packages

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.openwrt.name }} / ${{ matrix.target.name }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        openwrt:
          - name: openwrt-24.10
            sdk_base: https://downloads.openwrt.org/releases/24.10.0/targets
          - name: openwrt-snapshot-25.x
            sdk_base: https://downloads.openwrt.org/snapshots/targets
        target:
          - name: aarch64_generic
            target: armsr
            subtarget: armv8
          - name: arm_cortex-a7_neon-vfpv4
            target: sunxi
            subtarget: cortexa7

    steps:
      - name: Checkout L8x0GL feed
        uses: actions/checkout@v4
        with:
          path: L8x0GL

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gettext git libncurses5-dev \
            libssl-dev python3 python3-distutils python3-setuptools rsync swig \
            unzip zlib1g-dev file wget curl subversion ccache zstd xz-utils

      - name: Download OpenWrt SDK
        run: |
          set -eux
          SDK_DIR_URL="${{ matrix.openwrt.sdk_base }}/${{ matrix.target.target }}/${{ matrix.target.subtarget }}/"
          echo "SDK_DIR_URL=$SDK_DIR_URL"
          curl -fsSL "$SDK_DIR_URL" -o sdk-index.html
          SDK_FILE="$(grep -oE 'openwrt-sdk[^"<> ]+Linux-x86_64\.tar\.(xz|zst)' sdk-index.html | head -n 1)"
          if [ -z "$SDK_FILE" ]; then
            echo "SDK archive not found in $SDK_DIR_URL"
            grep -oE 'href="[^"]+"' sdk-index.html | sed 's/^href=//' | head -80
            exit 1
          fi
          echo "SDK_FILE=$SDK_FILE" >> "$GITHUB_ENV"
          curl -fL "${SDK_DIR_URL}${SDK_FILE}" -o "$SDK_FILE"
          mkdir sdk
          case "$SDK_FILE" in
            *.tar.zst) tar --zstd -xf "$SDK_FILE" -C sdk --strip-components=1 ;;
            *.tar.xz) tar -xJf "$SDK_FILE" -C sdk --strip-components=1 ;;
          esac
          echo "SDK_PATH=$GITHUB_WORKSPACE/sdk" >> "$GITHUB_ENV"

      - name: Cache SDK downloads
        uses: actions/cache@v4
        with:
          path: sdk/dl
          key: sdk-dl-${{ matrix.openwrt.name }}-${{ matrix.target.name }}-${{ hashFiles('L8x0GL/**/*.mk', 'L8x0GL/**/*.patch') }}
          restore-keys: |
            sdk-dl-${{ matrix.openwrt.name }}-${{ matrix.target.name }}-

      - name: Register feeds
        run: |
          set -eux
          cd "$SDK_PATH"
          echo "src-link l8x0gl $GITHUB_WORKSPACE/L8x0GL" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install -p l8x0gl l8x0gl-mbim lpac-mbim luci-app-l8x0gl

      - name: Configure packages
        run: |
          set -eux
          cd "$SDK_PATH"
          cat > .config <<'CONFIG'
          CONFIG_PACKAGE_l8x0gl-mbim=m
          CONFIG_PACKAGE_lpac-mbim=m
          CONFIG_PACKAGE_luci-app-l8x0gl=m
          CONFIG_LPAC_MBIM_ENABLE_MBIM=y
          # CONFIG_LPAC_MBIM_ENABLE_PCSC is not set
          # CONFIG_LPAC_MBIM_ENABLE_AT is not set
          # CONFIG_LPAC_MBIM_ENABLE_UQMI is not set
          CONFIG_CCACHE=y
          CONFIG_BUILD_LOG=y
          CONFIG_SIGNED_PACKAGES=n
          CONFIG
          sed -i 's/^          //' .config
          make defconfig
          grep -E 'CONFIG_PACKAGE_(l8x0gl|lpac-mbim|luci-app-l8x0gl)|CONFIG_LPAC_MBIM' .config || true

      - name: Download package sources
        run: |
          cd "$SDK_PATH"
          make package/lpac-mbim/download V=s

      - name: Compile packages
        run: |
          set -eux
          cd "$SDK_PATH"
          make package/l8x0gl-mbim/compile -j$(nproc) V=s
          make package/lpac-mbim/compile -j$(nproc) V=s
          make package/luci-app-l8x0gl/compile -j$(nproc) V=s

      - name: Collect artifacts
        if: always()
        run: |
          cd "$SDK_PATH"
          OUT="$GITHUB_WORKSPACE/artifacts/${{ matrix.openwrt.name }}-${{ matrix.target.name }}"
          mkdir -p "$OUT"
          find bin/packages -type f \( -name '*l8x0gl*.ipk' -o -name '*lpac-mbim*.ipk' \) -exec cp -v {} "$OUT/" \; || true
          if [ -d logs ]; then
            find logs -type f \( -name '*.txt' -o -name '*.log' \) -exec cp --parents {} "$OUT/" \; || true
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.openwrt.name }}-${{ matrix.target.name }}
          path: artifacts/${{ matrix.openwrt.name }}-${{ matrix.target.name }}
          if-no-files-found: warn
